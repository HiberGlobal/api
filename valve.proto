syntax = "proto3";

package hiber.valve;

import "base.proto";

option java_multiple_files = false;
option java_package = "global.hiber.api.grpc.valve";
option java_outer_classname = "ValveApi";
option go_package = ".;hiber";

message Valve {
    message Status {
        enum Combined {
            /* The Valve has not been initialized, status is not known.
             * Actions: Initialize the Valve.
             */
            NOT_INITIALIZED = 0;

            /* The Valve has been initialized, but has not sent a messages.
             * Actions: Wait for the Valve to send a message, contact support if this status persists.
             */
            NOT_CONNECTED = 1;

            /* The Valve is not in a valid state.
             * Actions: Please contact support.
             */
            NOT_VALID = 2;

            /* The Valve is closed and the high pressure line is PRESSURIZED.
             * Actions: You can BLEED_HIGH_PRESSURE_LINE to transition to BLEED_REQUESTED.
             */
            PRESSURIZED = 3;

            /* The Valve is still closed and the high pressure line is PRESSURIZED.
             * Actions: You can BLEED_HIGH_PRESSURE_LINE again or wait.
             */
            BLEED_REQUESTED = 4;

            /* The Valve is open and the high pressure line is bleeding.
             * Actions: You can CONFIRM_HIGH_PRESSURE_LINE_IS_ZERO to transition to DEPRESSURIZED.
             */
            BLEEDING_PRESSURE = 5;

            /* The Valve is open and the high pressure line is NOT_PRESSURIZED.
             * Actions: You can RESET_VALVE to transition to RESET_REQUESTED.
             */
            NOT_PRESSURIZED = 6;

            /* The Valve is still open and the high pressure line is NOT_PRESSURIZED.
             * Actions: You can RESET_VALVE again or wait.
             */
            RESET_REQUESTED = 7;

            /* The Valve is closed and the high pressure line is NOT_PRESSURIZED.
             * Actions: You can CONFIRM_VALVE_IS_RESET to transition to RESET.
             */
            RESETTING = 8;

            /* The Valve is closed and the high pressure line is READY_TO_BE_PRESSURIZED.
             * Actions: You can CONFIRM_HIGH_PRESSURE_LINE_UNDER_PRESSURE to transition back to PRESSURIZED.
             */
            READY_TO_BE_PRESSURIZED = 9;
        }

        /* Status of ths valve simplified to a single enum. */
        Combined status = 1;

        /* The pressure line status. */
        optional PressureLine.Status pressure_line = 2;

        /* Valve actuator status. */
        optional bool open = 3;

        /* The last operations performed on this Valve. */
        optional Operation last_operation = 4;

        /* The supported operations at this time. */
        repeated Operation possible_operations = 5;

        /* The time of the last message from the valve giving us the open state. */
        Timestamp last_message_at = 6;

        /* The time of the last operation. */
        Timestamp last_operation_at = 7;
    }

    /* An 8-character hexadecimal string */
    string number = 1;
    string organization = 2;
    string external_device_id = 3;
    string name = 4;
    string device_type = 5;
    /* Valve actuator status: open or closed. Deprecated in favour of status.open */
    bool open = 6 [deprecated = true];
    optional bool leak = 7;
    optional bool fraud = 8;
    optional int64 remaining_battery_voltage = 9;
    optional ValveProcess last_process = 10;
    /* The HP line status. Deprecated in favour of status.high_pressure_line. */
    HighPressureLineStatus high_pressure_line_status = 11 [deprecated = true];

    /* The status of this Valve. */
    Status status = 12;

    message ValveProcess {
        /* Modem valve actuator number. */
        string modem_number = 1;
        /* Operation from technician. */
        Operation operation = 2;
        /* Time that the operation was executed. */
        Timestamp operation_at = 3;
        /* High pressure line status after the operation. */
        HighPressureLineStatus high_pressure_line_status = 4 [deprecated = true];
        /* Pressure line status after the operation. */
        PressureLine.Status pressure_line_status = 5;
    }

    message PressureLine {
        enum Status {
            /* Pressure line = 0 bar. */
            NOT_PRESSURIZED = 0;

            /* Pressure line pressurized. */
            PRESSURIZED = 1;

            /* Pressure line ready to be pressurized.
             * Pressure line requires manual operation to change status to PRESSURIZED.
             */
            READY_TO_BE_PRESSURIZED = 2;
        }
    }

    enum HighPressureLineStatus {
        option deprecated = true;

        /* High pressure line = 0 bar. */
        NOT_PRESSURIZED = 0 [deprecated = true];

        /* High pressure line pressurized. */
        PRESSURIZED = 1 [deprecated = true];

        /* High pressure line ready to be pressurized.
         * High pressure line requires manual operation to change status to PRESSURIZED.
         */
        READY_TO_BE_PRESSURIZED = 2 [deprecated = true];
    }

    enum Operation {
        /* If no choice is made, fall back to no-operation */
        NO_OPERATION = 0;

        /* Open valve to bleed high pressure line.
         * Send a downlink command to LoRaWAN LNS to open the valve actuator.
         * High pressure line status should be changed: PRESSURIZED -> ZERO
         */

        BLEED_HIGH_PRESSURE_LINE = 1;

        /* Confirm high pressure line pressure is 0 bar.
         * High pressure line status can only be updated after operator's confirmation:
         * High pressure line status is confirmed: ZERO
         */
        CONFIRM_HIGH_PRESSURE_LINE_IS_ZERO = 2;

        /* Reset valve.
         * Send a downlink command to LoRaWAN LNS to close the valve actuator.
         * High pressure line status should be changed: ZERO -> READY_TO_BE_PRESSURIZED
         */
        RESET_VALVE = 3;

        /* Confirm valve is reset.
         * High pressure line status can only be updated after operator's confirmation:
         * High pressure line status is confirmed: READY_TO_BE_PRESSURIZED
         */
        CONFIRM_VALVE_IS_RESET = 4;

        /* Confirm high pressure line under pressure.
         * The operator is required to manually operate the high pressure line to make it PRESSURIZED
         * High pressure line status can only be updated after operator confirmation:
         * High pressure line status is confirmed: PRESSURIZED
         */
        CONFIRM_HIGH_PRESSURE_LINE_UNDER_PRESSURE = 5;
    }
}

/* Selection object for valve. */
message ValveSelection {
    /* Select by valve numbers. */
    optional Filter.Modems numbers = 1;

    /* Select by external device identifiers. */
    optional Filter.ModemIdentifiers identifiers = 2;

    optional string search = 3;

    /* Select by high pressure line status. */
    repeated Valve.Status.Combined status = 7;

    /* Select by high pressure line status. */
    repeated Valve.HighPressureLineStatus high_pressure_line_status = 4 [deprecated = true];

    /* Select by pressure line status. */
    repeated Valve.PressureLine.Status pressure_line_status = 8;

    /* Select opened valves. */
    optional bool only_opened_valve = 5;

    /* Select closed valves. */
    optional bool only_closed_valve = 6;
}
